<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open World 3D — City Heist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game-root { position: relative; width: 100vw; height: 100vh; }
    #game-canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
    #hud-root { position: absolute; inset: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="game-root">
    <canvas id="game-canvas"></canvas>
    <div id="hud-root"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
